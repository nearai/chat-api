# Test-only workflow: build image with cache, no push/attestation.
# Runs on push to any branch (so it appears when testing on feature branches) and can be triggered manually.
name: Build Test

on:
  workflow_dispatch:
  push:
    # Run on push to any branch so the workflow appears when testing on feature branches
    branches-ignore:
      - main

jobs:
  build:
    name: Build image (no push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Build image
        env:
          DOCKER_BUILD_CACHE: gha
        run: |
          ./scripts/build-image.sh
